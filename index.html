<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minute Cryptic: Birthday Edition</title>
    
    <!-- FORCING THE FONTS TO LOAD FROM GOOGLE: Mulish (Clue) and Salsa (Playful/Sasita alternative) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Mulish:wght@400;700&family=Salsa&display=swap" rel="stylesheet">
    
    <style>
        /* MINUTE CRYPTIC EXACT STYLING */
        body {
            /* Using your exact custom shade of blue */
            background-color: rgb(173 211 255 / 1); 
            color: #1a1a1a;
            font-family: 'Mulish', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Top Header Area */
        .top-bar {
            width: 100%;
            max-width: 800px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .back-arrow {
            font-size: 24px;
            font-weight: bold;
        }

        .header-info {
            line-height: 1.3;
        }

        .header-date {
            font-family: 'Mulish', sans-serif;
            font-weight: bold;
            font-size: 1.1rem;
        }

        .header-byline {
            font-family: 'Mulish', sans-serif;
            font-size: 0.85rem;
            color: #444;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .icon {
            font-size: 24px;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .m-logo {
            font-family: Georgia, serif;
            font-style: italic;
            font-size: 28px;
            font-weight: bold;
        }

        /* The Main Clue Box */
        .clue-container {
            width: 100%;
            max-width: 700px;
            background: white;
            border: 2px solid black;
            border-radius: 8px;
            padding: 30px;
            box-shadow: 4px 4px 0px rgba(0,0,0,1);
            margin-bottom: 30px;
            text-align: left;
        }

        .clue-box {
            font-family: 'Mulish', sans-serif; /* Forced Mulish Font */
            font-weight: 700;
            font-size: 1.35rem;
            line-height: 1.5;
            color: #1a1a1a;
        }

        /* Input Grid */
        .grid {
            display: flex;
            justify-content: center;
            margin-bottom: 30px;
        }

        .letter-input {
            font-family: 'Salsa', cursive, sans-serif; /* Forced Sasita-style Font */
            width: 55px;
            height: 55px;
            border: 3px solid black;
            background: white;
            font-size: 1.8rem;
            font-weight: bold;
            text-align: center;
            text-transform: lowercase;
            outline: none;
            transition: background-color 0.2s ease;
            box-shadow: 3px 3px 0px rgba(0,0,0,1);
            margin: 0;
            border-right: 1.5px solid black;
            border-left: 1.5px solid black;
        }
        
        .letter-input:first-child {
            border-top-left-radius: 4px;
            border-bottom-left-radius: 4px;
            border-left: 3px solid black;
        }
        
        .letter-input:last-child {
            border-top-right-radius: 4px;
            border-bottom-right-radius: 4px;
            border-right: 3px solid black;
        }

        /* Light Pink background when active typing */
        .letter-input.active {
            background-color: #F8D8F7; 
        }

        /* NEW: Locked Answer Pink State (Appears after hitting Enter) */
        .letter-input.correct-pink {
            background-color: #F8D8F7 !important;
            color: #1a1a1a;
        }

        /* Attempt Tracker */
        .attempt-tracker {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }

        .attempt-dot {
            width: 18px;
            height: 18px;
            border: 2px solid black;
            border-radius: 50%;
            background-color: #D3EAFF;
        }

        .attempt-dot.filled {
            background-color: #F8D8F7;
        }
        
        .attempt-dot.active {
            background-color: white;
        }

        .par-byline {
            font-family: Georgia, serif;
            font-style: italic;
            font-weight: bold;
            font-size: 1.1rem;
            margin-top: 5px;
            margin-bottom: 30px;
        }

        /* The Success Screen Overlay */
        .success-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(173, 211, 255, 0.95); /* matching blue shade translucent */
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        .success-card {
            background: white;
            border: 3px solid black;
            border-radius: 8px;
            padding: 40px;
            width: 90%;
            max-width: 500px;
            text-align: center;
            box-shadow: 6px 6px 0px rgba(0,0,0,1);
        }

        .success-msg-main {
            font-family: 'Salsa', cursive, sans-serif; /* Forced Sasita-style Font */
            font-weight: bold;
            font-size: 2.2rem;
            margin-bottom: 10px;
        }
        
        .success-msg-details {
            font-family: 'Mulish', sans-serif;
            font-size: 1.1rem;
            color: #444;
            margin-bottom: 30px;
        }

        .share-btn {
            background-color: #F8D8F7;
            border: 3px solid black;
            border-radius: 20px;
            padding: 10px 40px;
            font-family: Georgia, serif;
            font-style: italic;
            font-size: 1.3rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 4px 4px 0px rgba(0,0,0,1);
            transition: all 0.1s ease;
        }
    </style>
</head>
<body>

    <!-- TOP HEADER -->
    <div class="top-bar">
        <div class="header-left">
            <span class="back-arrow">&#8592;</span>
            <div class="header-info">
                <div class="header-date">9 July 2026</div>
                <div class="header-byline">By Belle</div>
            </div>
        </div>
        <div class="header-right">
            <span class="icon">&#9432;</span>
            <span class="m-logo">m</span>
        </div>
    </div>

    <!-- MAIN GAME AREA -->
    <div class="clue-container">
        <div class="clue-box">
            "Whose special day is it today?" (5)
        </div>
    </div>

    <div class="grid" id="inputGrid"></div>

    <!-- Attempt Dots -->
    <div class="attempt-tracker">
        <div class="attempt-dot"></div>
        <div class="attempt-dot active"></div>
        <div class="attempt-dot"></div>
        <div class="attempt-dot"></div>
        <div class="attempt-dot"></div>
        <div class="attempt-dot"></div>
        <div class="attempt-dot"></div>
        <div class="attempt-dot"></div>
    </div>
    <div class="par-byline">par</div>


    <!-- SUCCESS SCREEN -->
    <div class="success-overlay" id="successOverlay">
        <div class="success-card">
            <div class="attempt-tracker" style="justify-content: center;">
                <div class="attempt-dot filled"></div>
                <div class="attempt-dot filled"></div>
                <div class="attempt-dot filled"></div>
                <div class="attempt-dot filled"></div>
                <div class="attempt-dot filled"></div>
                <div class="attempt-dot filled"></div>
                <div class="attempt-dot filled"></div>
                <div class="attempt-dot filled"></div>
            </div>
            
            <div class="success-msg-main">Happy Birthday, Sarah!</div>
            <div class="success-msg-details">2 under par</div>
            
            <!-- YOUR CUSTOM PARAGRAPH MESSAGE HERE -->
            <div style="text-align: left; margin-bottom: 30px; line-height: 1.6; font-family: 'Mulish', sans-serif;">
                <p>Insert your whole paragraph and stuff right here. This message is only revealed when they get the answer correct! You can make it as long or personal as you need to celebrate your friend.</p>
            </div>
            
            <button class="share-btn">share</button>
        </div>
    </div>

    <script>
        // CONFIGURATION
        const ANSWER = "SARAH"; 

        const grid = document.getElementById('inputGrid');
        const successOverlay = document.getElementById('successOverlay');
        const inputs = [];

        // Grid Generation
        for (let i = 0; i < ANSWER.length; i++) {
            const input = document.createElement('input');
            input.type = 'text';
            input.maxLength = 1;
            input.className = 'letter-input';
            if (i === 0) input.classList.add('active'); 
            grid.appendChild(input);
            inputs.push(input);

            // Forward Typing Action
            input.addEventListener('input', (e) => {
                if (e.target.value.length === 1 && i < ANSWER.length - 1) {
                    inputs[i].classList.remove('active');
                    inputs[i + 1].focus();
                    inputs[i + 1].classList.add('active');
                }
            });

            // Backspace/Delete Action & Enter key interception
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && e.target.value.length === 0 && i > 0) {
                    inputs[i].classList.remove('active');
                    inputs[i - 1].focus();
                    inputs[i - 1].classList.add('active');
                }
                
                // Submit only on "Enter"
                if (e.key === 'Enter') {
                    checkAnswer();
                }
            });
            
            input.addEventListener('focus', () => {
                inputs.forEach(inp => inp.classList.remove('active'));
                input.classList.add('active');
            });
        }

        function checkAnswer() {
            let currentGuess = inputs.map(input => input.value.toUpperCase()).join('');
            
            if (currentGuess === ANSWER) {
                // Change the text grid boxes permanently to pink on success!
                inputs.forEach(input => {
                    input.classList.remove('active');
                    input.classList.add('correct-pink');
                    input.disabled = true;
                });
                
                // Short delay to let them see the pink grid boxes before the card appears
                setTimeout(() => {
                    successOverlay.style.display = 'flex'; 
                }, 400);
            } else {
                alert("Try again!");
            }
        }
    </script>
</body>
</html>
