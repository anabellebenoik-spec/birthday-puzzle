<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minute Cryptic: Birthday Edition</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Mulish:wght@400;700&family=Salsa&display=swap" rel="stylesheet">
    
    <style>
        /* MINUTE CRYPTIC EXACT STYLING */
        body {
            background-color: rgb(173 211 255); 
            color: #1a1a1a;
            font-family: 'Mulish', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        /* Top Header Area */
        .top-bar {
            width: 100%;
            max-width: 600px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .back-arrow {
            font-size: 24px;
            font-weight: 900;
            cursor: pointer;
        }

        .header-info {
            line-height: 1.3;
        }

        .header-date {
            font-family: 'Mulish', sans-serif;
            font-weight: bold;
            font-size: 1.1rem;
        }

        .header-byline {
            font-family: 'Mulish', sans-serif;
            font-size: 0.85rem;
            color: #333;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .icon {
            font-size: 24px;
            font-weight: 900;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        
        .m-logo {
            font-family: Georgia, serif;
            font-style: italic;
            font-size: 28px;
            font-weight: 900;
        }

        /* The Main Clue Box (Removed black border/heavy shadow per instructions) */
        .clue-container {
            width: 100%;
            max-width: 600px;
            background: white;
            border-radius: 12px; /* Soft smooth corners */
            padding: 25px 30px;
            margin-bottom: 35px;
            text-align: left;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        }

        .clue-box {
            font-family: 'Mulish', sans-serif;
            font-weight: 500;
            font-size: 1.4rem;
            line-height: 1.4;
            color: #1a1a1a;
        }

        /* Input Grid with Uniform Borders */
        .grid {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }

        .letter-input {
            font-family: 'Salsa', cursive, sans-serif;
            width: 52px;
            height: 52px;
            border: 5px solid black; /* Thick outer & inner appearance */
            background: white;
            font-size: 2rem;
            font-weight: bold;
            text-align: center;
            text-transform: lowercase;
            outline: none;
            margin-right: -3.5px; /* Blends walls together uniformly */
        }
        
        .letter-input:first-child {
            border-top-left-radius: 8px;
            border-bottom-left-radius: 8px;
        }
        
        .letter-input:last-child {
            border-top-right-radius: 8px;
            border-bottom-right-radius: 8px;
            margin-right: 0;
        }

        .letter-input.active {
            background-color: #F8D8F7; /* Active input box pink highlight */
        }

        .letter-input.correct-pink {
            background-color: #F8D8F7 !important;
            color: #1a1a1a;
        }

        /* Attempt Tracker Section */
        .attempt-tracker {
            display: flex;
            gap: 10px;
            margin-bottom: 5px;
        }

        .attempt-dot {
            width: 18px;
            height: 18px;
            border: 2px solid black;
            border-radius: 50%;
            background-color: #D3EAFF;
        }

        .attempt-dot.filled {
            background-color: #F8D8F7;
        }
        
        .attempt-dot.active {
            background-color: white;
        }

        .par-byline {
            font-family: Georgia, serif;
            font-style: italic;
            font-weight: bold;
            font-size: 1.2rem;
            margin-top: 0px;
            margin-bottom: 35px;
            text-align: left; /* Aligns text to the left */
            width: 100%; /* Ensures it spans across the container */
            max-width: 245px; /* Adjusts it to sit right under the grid's left edge */
        }

        /* Action Buttons Area from Image 2 */
        .action-button-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            width: 100%;
            max-width: 600px;
        }

        .btn-base {
            border: 3.5px solid black;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 3px 3px 0px rgba(0,0,0,1);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.05s ease, box-shadow 0.05s ease;
        }

        .btn-base:active {
            transform: translate(2px, 2px);
            box-shadow: 1px 1px 0px rgba(0,0,0,1);
        }

        .scribble-circle {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background-color: #C3E0FE;
            font-size: 1.4rem;
        }

        .pill-btn {
            height: 48px;
            border-radius: 24px;
            font-size: 1.5rem;
            padding: 0 35px;
        }

        .hints-btn {
            background-color: #FFEFA6;
            font-family: Georgia, serif;
            font-style: italic;
            font-weight: 900;
        }

        .check-btn {
            background-color: #F8D8F7;
            font-family: Georgia, serif;
            font-style: italic;
            font-weight: 900;
        }

        /* Success Screen Overlays */
        .success-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(173, 211, 255, 0.95);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        .success-card {
            background: white;
            border: 3px solid black;
            border-radius: 12px;
            padding: 40px;
            width: 90%;
            max-width: 480px;
            text-align: center;
            box-shadow: 6px 6px 0px rgba(0,0,0,1);
        }

        .success-msg-main {
            font-family: 'Salsa', cursive, sans-serif;
            font-weight: bold;
            font-size: 2.2rem;
            margin-bottom: 10px;
        }
        
        .success-msg-details {
            font-family: 'Mulish', sans-serif;
            font-size: 1.1rem;
            color: #444;
            margin-bottom: 30px;
        }

        .share-btn {
            background-color: #F8D8F7;
            border: 3px solid black;
            border-radius: 20px;
            padding: 10px 40px;
            font-family: Georgia, serif;
            font-style: italic;
            font-size: 1.3rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 4px 4px 0px rgba(0,0,0,1);
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="header-left">
            <span class="back-arrow">&#8592;</span>
            <div class="header-info">
                <div class="header-date">9 July 2026</div>
                <div class="header-byline">By Belle</div>
            </div>
        </div>
        <div class="header-right">
            <span class="icon">&#9432;</span>
            <span class="m-logo">m</span>
        </div>
    </div>

    <div class="clue-container">
        <div class="clue-box">
            "Whose special day is it today?" (5)
        </div>
    </div>

    <div class="grid" id="inputGrid"></div>

    <div class="attempt-tracker">
        <div class="attempt-dot"></div>
        <div class="attempt-dot active"></div>
        <div class="attempt-dot"></div>
        <div class="attempt-dot"></div>
        <div class="attempt-dot"></div>
        <div class="attempt-dot"></div>
        <div class="attempt-dot"></div>
        <div class="attempt-dot"></div>
    </div>
    <div class="  par-byline">par</div>

    <div class="action-button-container">
        <button class="btn-base scribble-circle">〰</button>
        <button class="btn-base pill-btn hints-btn">hints</button>
        <button class="btn-base pill-btn check-btn" id="checkBtn">check</button>
    </div>

    <div class="success-overlay" id="successOverlay">
        <div class="success-card">
            <div class="attempt-tracker" style="justify-content: center; margin-bottom: 20px;">
                <div class="attempt-dot filled"></div>
                <div class="attempt-dot filled"></div>
                <div class="attempt-dot filled"></div>
                <div class="attempt-dot filled"></div>
                <div class="attempt-dot filled"></div>
                <div class="attempt-dot filled"></div>
                <div class="attempt-dot filled"></div>
                <div class="attempt-dot filled"></div>
            </div>
            
            <div class="success-msg-main">Happy Birthday, Sarah!</div>
            <div class="success-msg-details">2 under par</div>
            
            <div style="text-align: left; margin-bottom: 30px; line-height: 1.6; font-family: 'Mulish', sans-serif;">
                <p>Insert your whole paragraph and stuff right here. This message is only revealed when they get the answer correct! You can make it as long or personal as you need to celebrate your friend.</p>
            </div>
            
            <button class="share-btn">share</button>
        </div>
    </div>

    <script>
        // CONFIGURATION
        const ANSWER = "SARAH"; 

        const grid = document.getElementById('inputGrid');
        const successOverlay = document.getElementById('successOverlay');
        const checkBtn = document.getElementById('checkBtn');
        const inputs = [];

        // Grid Generation with Custom Uniform Walls
        for (let i = 0; i < ANSWER.length; i++) {
            const input = document.createElement('input');
            input.type = 'text';
            input.maxLength = 1;
            input.className = 'letter-input';
            if (i === 0) input.classList.add('active'); 
            grid.appendChild(input);
            inputs.push(input);

            // Forward Cursor Auto-advance Logic
            input.addEventListener('input', (e) => {
                if (e.target.value.length === 1 && i < ANSWER.length - 1) {
                    inputs[i].classList.remove('active');
                    inputs[i + 1].focus();
                    inputs[i + 1].classList.add('active');
                }
            });

            // Backspace/Delete & Keyboard Navigation
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && e.target.value.length === 0 && i > 0) {
                    inputs[i].classList.remove('active');
                    inputs[i - 1].focus();
                    inputs[i - 1].classList.add('active');
                }
                
                // Submit via keyboard Enter
                if (e.key === 'Enter') {
                    checkAnswer();
                }
            });
            
            input.addEventListener('focus', () => {
                inputs.forEach(inp => inp.classList.remove('active'));
                input.classList.add('active');
            });
        }

        // Event Listener for the New Custom Check Button
        checkBtn.addEventListener('click', checkAnswer);

        function checkAnswer() {
            let currentGuess = inputs.map(input => input.value.toUpperCase()).join('');
            
            if (currentGuess === ANSWER) {
                // Instantly turn boxes pink upon submission verification
                inputs.forEach(input => {
                    input.classList.remove('active');
                    input.classList.add('correct-pink');
                    input.disabled = true;
                });
                
                // Slight classic smooth buffer before modal overlay triggers
                setTimeout(() => {
                    successOverlay.style.display = 'flex'; 
                }, 400);
            } else {
                alert("Try again!");
            }
        }
    </script>
</body>
</html>
